name: ci

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (locked)
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Pre-download EstNLTK WordNet (used by synonyms tool)
        # Try EstNLTK's built-in S3 download; fall back to our GH
        # Release mirror if the upstream S3 (hpc.ut.ee) is down.
        run: |
          set +e
          echo "y" | uv run --python ${{ matrix.python-version }} python -c "from estnltk.wordnet import Wordnet; Wordnet()"
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            echo "Upstream WordNet download failed; falling back to GH Release mirror."
            WN_DIR=$(uv run --python ${{ matrix.python-version }} python -c "from estnltk.resource_utils import get_resources_dir; print(get_resources_dir())")
            mkdir -p "$WN_DIR/wordnet"
            curl -fsSL --retry 3 --retry-delay 2 \
              -o /tmp/wn.zip \
              "https://github.com/silly-geese/estonian-mcp/releases/download/v0.1.0-models/wordnet_2026-02-13.zip"
            unzip -q -o /tmp/wn.zip -d "$WN_DIR/wordnet/"
            rm /tmp/wn.zip
            # sanity: confirm Wordnet() now loads from the unpacked tree
            uv run --python ${{ matrix.python-version }} python -c "from estnltk.wordnet import Wordnet; assert Wordnet()['kasutama'], 'wordnet still not loadable after mirror fallback'"
          fi

      - name: Pre-download fastText-et-mini (used by find_related_words tool)
        run: |
          mkdir -p $HOME/.cache/estnltk-mcp
          F="$HOME/.cache/estnltk-mcp/fasttext-et-mini"
          # Try Zenodo first (canonical upstream), fall back to our GH
          # Release mirror on outage. Both URLs serve the same bytes;
          # MD5 check below verifies whichever path returned content.
          curl -fsSL --retry 3 --retry-delay 2 -o "$F" \
            "https://zenodo.org/records/4905385/files/fasttext-et-mini?download=1" \
          || curl -fsSL --retry 3 --retry-delay 2 -o "$F" \
            "https://github.com/silly-geese/estonian-mcp/releases/download/v0.1.0-models/fasttext-et-mini"
          echo "0904bf4e96e53a727069f783a3415869  $F" | md5sum -c -
          echo "ESTNLTK_MCP_FASTTEXT_PATH=$F" >> $GITHUB_ENV

      - name: Run tool smoke tests
        run: uv run --python ${{ matrix.python-version }} python tests/test_smoke.py

      - name: Run HTTP smoke tests
        run: uv run --python ${{ matrix.python-version }} python tests/test_http.py

  docker:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: estonian-mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot container, hit /health, hit /mcp with bearer
        run: |
          set -euo pipefail
          TOKEN="ci-token-$(openssl rand -hex 12)"
          docker run -d --name mcp -p 8081:8081 \
            -e ESTNLTK_MCP_AUTH_TOKEN="$TOKEN" \
            estonian-mcp:ci
          # Container takes ~5-10s to be ready (uvicorn + lazy estnltk import).
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8081/health >/dev/null 2>&1; then
              echo "ready after ${i}s"
              break
            fi
            sleep 1
          done
          echo "--- /health"
          curl -fsS http://127.0.0.1:8081/health
          echo
          echo "--- /mcp without token (expect 401)"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8081/mcp -H 'Content-Type: application/json' -d '{}')" = "401"
          echo "--- /mcp with bearer (expect 200)"
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:8081/mcp \
            -H "Authorization: Bearer $TOKEN" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}')" = "200"
          docker logs mcp | tail -20
          docker rm -f mcp
