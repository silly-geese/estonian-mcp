# Fly.io deployment config.
#
# Defaults to PUBLIC mode (no auth, per-IP rate limit).
#
# To deploy your own public instance:
#
#   fly auth login
#   fly apps create estonian-mcp           # pick your own app name
#   fly deploy
#
# To deploy in BEARER mode instead:
#
#   1. Remove the ESTNLTK_MCP_PUBLIC_MODE line from [env] below.
#   2. fly secrets set ESTNLTK_MCP_AUTH_TOKEN="$(python3 -c 'import secrets;print(secrets.token_urlsafe(32))')"
#   3. fly deploy
#
# After first deploy, your MCP endpoint is:  https://<your-app>.fly.dev/mcp

app = "estonian-mcp"          # change to your app name
primary_region = "ams"        # Amsterdam — close to .ee
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]

[env]
  ESTNLTK_MCP_TRANSPORT = "http"
  ESTNLTK_MCP_PUBLIC_MODE = "1"   # no bearer auth; per-IP rate limit only
  HOST = "0.0.0.0"
  PORT = "8081"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = "stop"      # scale to zero when idle
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"      # bumped from 512mb to comfortably hold EstNLTK + fastText
  cpus = 1
